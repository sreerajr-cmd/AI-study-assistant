<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Study Assistant</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Sidebar -->
    <div class="sidebar">

        <h2>📚 Study AI</h2>

        <button class="new-chat">
            + New Chat
        </button>

        <div class="menu">

            <button onclick="setMode('notes')">
                📝 Notes
            </button>

            <button onclick="setMode('mcq')">
                ❓ MCQs
            </button>

            <button onclick="setMode('summary')">
                📖 Summary
            </button>

            <button onclick="setMode('exam')">
                🎯 Exam Prep
            </button>

        </div>

    </div>

    <!-- Main Content -->
    <div class="main">

        <div class="header">
            <h1>🤖 AI Study Assistant</h1>
            <p>Powered by Groq + FastAPI</p>
        </div>

        <!-- Chat Area -->
        <div id="chat-box" class="chat-box">

            <div class="ai-message">
                👋 Hello! I'm your AI Study Assistant.
                <br><br>
                Select a mode from the left and ask a question.
            </div>

        </div>

        <!-- Input Area -->
        <div class="input-area">

            <textarea
                id="question"
                placeholder="Type your question here..."
            ></textarea>

            <button onclick="askAI()">
                Send ➤
            </button>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
